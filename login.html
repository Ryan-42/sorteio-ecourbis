<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso · Sorteio Copa EcoUrbis</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Segoe UI",system-ui,sans-serif; min-height:100vh; display:flex;
    align-items:center; justify-content:center; padding:20px;
    background:radial-gradient(120% 80% at 50% -10%, #2a5fc0 0%, #14306a 45%, #0c1f47 100%);
    color:#EAF1FB;
  }
  .card{
    background:rgba(255,255,255,.04); border:1px solid rgba(174,191,220,.16); border-radius:16px;
    padding:40px 34px; max-width:380px; width:100%; text-align:center;
    box-shadow:0 18px 50px -18px rgba(0,0,0,.55);
  }
  h1{font-size:1.5rem; margin-bottom:6px}
  p{color:#aebfdc; font-size:.9rem; margin-bottom:22px; font-weight:300}
  input{
    width:100%; padding:13px 14px; font-size:1rem; border-radius:10px;
    border:1px solid rgba(174,191,220,.16); background:rgba(10,23,51,.55); color:#EAF1FB;
    margin-bottom:14px; text-align:center;
  }
  input:focus{outline:none; border-color:#4FB286}
  button{
    width:100%; padding:13px; font-size:1rem; font-weight:600; border:0; border-radius:10px;
    background:#4FB286; color:#0a1733; cursor:pointer; transition:.15s;
  }
  button:hover:not(:disabled){transform:translateY(-2px)}
  button:disabled{opacity:.5; cursor:wait}
  #erro{color:#ffb4a8; font-size:.85rem; margin-top:14px; min-height:1.2em}
</style>
</head>
<body>
  <form class="card" id="form-login">
    <h1>🏆 Sorteio Copa</h1>
    <p>EcoUrbis Ambiental — acesso restrito</p>
    <input type="password" id="senha" placeholder="Senha de acesso" autocomplete="current-password" autofocus required>
    <button type="submit" id="btn">Entrar</button>
    <p id="erro"></p>
  </form>

  <script>
    const form = document.getElementById('form-login');
    const btn  = document.getElementById('btn');
    const erro = document.getElementById('erro');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const senha = document.getElementById('senha').value;
      btn.disabled = true; btn.textContent = 'Verificando…'; erro.textContent = '';
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ senha })
        });
        if (res.ok) {
          window.location.href = '/';
          return;
        }
        const data = await res.json().catch(() => ({}));
        erro.textContent = data.detail || 'Senha incorreta.';
      } catch {
        erro.textContent = 'Erro de conexão. Tente novamente.';
      }
      btn.disabled = false; btn.textContent = 'Entrar';
    });
  </script>
</body>
</html>
